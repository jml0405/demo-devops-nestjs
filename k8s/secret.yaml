apiVersion: v1
kind: Secret
metadata:
  name: devsu-demo-secret
  namespace: devsu-demo
type: Opaque
# Values are base64 encoded: echo -n 'value' | base64
# DATABASE_NAME:     ./dev.sqlite → Li9kZXYuc3FsaXRl
# DATABASE_USER:     user         → dXNlcg==
# DATABASE_PASSWORD: password     → cGFzc3dvcmQ=
data:
  DATABASE_NAME: Li9kZXYuc3FsaXRl
  DATABASE_USER: dXNlcg==
  DATABASE_PASSWORD: cGFzc3dvcmQ=
