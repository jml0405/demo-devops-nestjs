apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsu-demo-deployment
  namespace: devsu-demo
  labels:
    app: devsu-demo-nodejs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsu-demo-nodejs
  template:
    metadata:
      labels:
        app: devsu-demo-nodejs
    spec:
      # Run as non-root (matches Dockerfile USER node, uid=1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: devsu-demo-nodejs
          # IMAGE_PLACEHOLDER is replaced by the CI/CD pipeline with the actual image+sha tag
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            - configMapRef:
                name: devsu-demo-config
            - secretRef:
                name: devsu-demo-secret

          # Resource limits for predictable scheduling
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Liveness probe – restart container if it stops responding
          livenessProbe:
            httpGet:
              path: /api/users
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness probe – only send traffic once the app is up
          readinessProbe:
            httpGet:
              path: /api/users
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # SQLite DB file persisted within the pod lifetime
          volumeMounts:
            - name: sqlite-data
              mountPath: /app
              subPath: data

      volumes:
        - name: sqlite-data
          emptyDir: {}
