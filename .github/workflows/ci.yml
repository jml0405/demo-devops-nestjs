name: CI – Continuous Integration
run-name: CI #${{ github.run_number }} · ${{ github.event_name }} · ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-nodejs

jobs:
  # ── 1. Code Build ───────────────────────────────────────────────────────────
  build:
    name: Code Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  # ── 2. Static Code Analysis ─────────────────────────────────────────────────
  lint:
    name: Static Code Analysis (ESLint)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  # ── 3. Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npm test

  # ── 4. Code Coverage ────────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 5. Vulnerability Scan ───────────────────────────────────────────────────
  trivy_fs:
    name: Vulnerability Scan (Trivy FS)
    runs-on: ubuntu-latest
    needs: [lint, coverage]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-report.txt
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy filesystem report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          retention-days: 7

  # ── 6. Docker Build, Push & Image Scan ─────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint, coverage, trivy_fs]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute image tag
        id: image_tag
        run: python3 scripts/compute_image_tag.py --output image_tag.txt

      - name: Expose image metadata
        run: |
          IMAGE_TAG="${{ steps.image_tag.outputs.image_tag }}"
          IMAGE_REF="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_REF=$IMAGE_REF" >> $GITHUB_ENV
          echo "::notice title=CI image version::$IMAGE_REF"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build version summary
        run: |
          {
            echo "## Image Version"
            echo ""
            echo "- Image: \`${{ env.IMAGE_REF }}\`"
            echo "- Git SHA: \`${{ github.sha }}\`"
            echo "- Run number: \`${{ github.run_number }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save image metadata
        run: |
          cat > image-metadata.json <<EOF
          {
            "image_name": "${{ env.IMAGE_NAME }}",
            "image_tag": "${{ env.IMAGE_TAG }}",
            "image_ref": "${{ env.IMAGE_REF }}",
            "git_sha": "${{ github.sha }}",
            "run_number": "${{ github.run_number }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-${{ steps.image_tag.outputs.image_tag }}
          path: |
            image_tag.txt
            image-metadata.json
          retention-days: 14

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          output: trivy-image-report.txt
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report-${{ steps.image_tag.outputs.image_tag }}
          path: trivy-image-report.txt
          retention-days: 7
